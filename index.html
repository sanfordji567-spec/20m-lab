<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Leaflet.js</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { width: 100%; height: 500px; }
        .concentric { fill-opacity: 0.1; }
        .probability-wedge { fill-opacity: 0.5; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the map
        var map = L.map('map').setView([40.0077, -105.2656], 13);
        L.tileLayer('https://{s}.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 18
        }).addTo(map);

        // Base layer marker for bullet impact
        var bulletImpactMarker = L.marker([40.0077, -105.2656]).addTo(map);

        // Concentric circles
        var distances = [2, 15, 30]; // distances in meters
        distances.forEach(function(distance) {
            L.circle([40.0077, -105.2656], {
                radius: distance,
                className: 'concentric'
            }).addTo(map);
        });

        // 20m red reference circle
        L.circle([40.0077, -105.2656], {
            radius: 20,
            color: 'red',
            className: 'concentric'
        }).addTo(map);

        // Blue probability wedge (bearing 315°, 60° sector)
        var wedgeCoords = [
            [40.0077, -105.2656],
            [40.0077 + (0.0005 * Math.cos(Math.PI * 315 / 180)), -105.2656 + (0.0005 * Math.sin(Math.PI * 315 / 180))],
            [40.0077 + (0.0005 * Math.cos(Math.PI * (315 + 60) / 180)), -105.2656 + (0.0005 * Math.sin(Math.PI * (315 + 60) / 180))]
        ];
        L.polygon(wedgeCoords, { className: 'probability-wedge' }).addTo(map);

        // Add camera markers (example coordinates)
        var cameraLocations = [
            [40.0077, -105.2656],
            [40.0080, -105.2660],
            [40.0070, -105.2645]
        ];
        cameraLocations.forEach(function(location) {
            L.marker(location).addTo(map);
        });

        // Click to add pin functionality
        map.on('click', function(e) {
            var newMarker = L.marker(e.latlng).addTo(map);
            newMarker.bindPopup('User-added pin. Right-click to delete.');

            // Right-click to delete
            newMarker.on('contextmenu', function() {
                map.removeLayer(newMarker);
            });
        });
    </script>
</body>
</html>
